<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>だっち雀 麻雀役一覧</title>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@500&family=Noto+Sans+JP:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f4eb;
            --main-red: #9e1b1b;
            --accent-gold: #d4af37;
            --dark-charcoal: #1a1a1a;
            --card-bg: #ffffff;
            --association-blue: #1a73e8;
            --dragon-purple: #9c27b0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--dark-charcoal);
            line-height: 1.5;
            padding-bottom: 40px;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background-color: #fffdf9;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* 👑 ヘッダー */
        header {
            background: linear-gradient(135deg, var(--dark-charcoal) 0%, var(--main-red) 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid var(--accent-gold);
            position: relative;
        }
        header h1 {
            font-family: 'Kiwi Maru', serif;
            font-size: 1.6rem;
            color: var(--accent-gold);
        }
        .back-btn {
            position: absolute;
            left: 15px; top: 22px;
            color: var(--accent-gold);
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid var(--accent-gold);
            padding: 3px 8px;
            border-radius: 4px;
        }

        main { padding: 15px; }

        .intro-box {
            background: #ffffff;
            border: 1px solid #e0dacf;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #555;
            text-align: center;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        h2 {
            font-size: 1.1rem;
            border-left: 4px solid var(--main-red);
            padding-left: 8px;
            margin: 24px 0 12px 0;
            color: var(--dark-charcoal);
        }

        /* 🔗 特大リンクカード */
        .link-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .ref-card {
            display: flex;
            align-items: center;
            background: #ffffff;
            border: 2px solid #e0dacf;
            border-radius: 12px;
            padding: 18px;
            text-decoration: none;
            color: var(--dark-charcoal);
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.04);
        }

        .ref-card:active {
            transform: scale(0.97);
        }

        /* 🟦 日本プロ麻雀協会 */
        .card-association { 
            border-color: var(--association-blue); 
            background: linear-gradient(135deg, #ffffff 75%, #f0f6ff 100%); 
        }
        .card-association .card-icon { background: #e8f0fe; color: var(--association-blue); }
        .card-association .card-title { color: var(--association-blue); font-size: 1.2rem; }

        /* 🟪 麻雀ドラゴン */
        .card-dragon { 
            border-color: var(--dragon-purple); 
            background: linear-gradient(135deg, #ffffff 75%, #faf0f6 100%); 
        }
        .card-dragon .card-icon { background: #fbe7fe; color: var(--dragon-purple); }
        .card-dragon .card-title { color: var(--dragon-purple); font-size: 1.2rem; }

        .card-icon {
            font-size: 1.8rem;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .card-info {
            flex-grow: 1;
        }

        .card-title {
            font-weight: 700;
            margin-bottom: 2px;
        }

        .card-desc {
            font-size: 0.78rem;
            color: #666;
            line-height: 1.4;
        }

        .card-arrow {
            font-size: 1.1rem;
            color: #bbb;
            font-weight: bold;
            margin-left: 10px;
        }

        /* 🖼️ 画像表示エリア */
        .image-container {
            margin-top: 15px;
            text-align: center;
            background: #ffffff;
            border: 1px solid #e0dacf;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .illust-img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <a href="index.html" class="back-btn">◀ 戻る</a>
        <h1>だっち雀 役一覧</h1>
    </header>

    <main>
        <div class="intro-box">
            📖 <strong>公式役・詳細ルール確認ポータル</strong><br>
            役の成立条件や、詳細なルールをいつでも確認できます。
        </div>

        <h2>詳細リファレンス（外部リンク）</h2>

        <div class="link-grid">
            
            <!-- 🌐 日本プロ麻雀協会リンク -->
            <a href="https://www.ma-jan.or.jp/activity/yaku.html" target="_blank" rel="noopener noreferrer" class="ref-card card-association">
                <div class="card-icon">📜</div>
                <div class="card-info">
                    <div class="card-title">日本プロ麻雀協会 役一覧</div>
                    <div class="card-desc">公式プロ団体による信頼性の高い役一覧。各役の成立条件や鳴き制限をシンプルにスピード確認！</div>
                </div>
                <div class="card-arrow">▶</div>
            </a>

            <!-- 🌐 麻雀ドラゴンリンク -->
            <a href="https://mj-dragon.com/yaku/formal/#google_vignette" target="_blank" rel="noopener noreferrer" class="ref-card card-dragon">
                <div class="card-icon">🐉</div>
                <div class="card-info">
                    <div class="card-title">麻雀ドラゴン 公式役・詳細解説</div>
                    <div class="card-desc">手牌の画像付きで圧倒的に分かりやすい！初心者への説明や、特殊な複合役の確認にも最適。</div>
                </div>
                <div class="card-arrow">▶</div>
            </a>

        </div>

        <h2>家族みんなで楽しく麻雀！</h2>

        <!-- 📸 ご指定の画像エリア -->
        <div class="image-container">
            <img src="pokemon.png" alt="家族麻雀イメージ" class="illust-img">
        </div>
    </main>
</div>

</body>
</html>
