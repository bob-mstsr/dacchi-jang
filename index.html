<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>だっち雀 - 家族麻雀＆だっちコイン管理</title>
    <!-- Google Fontsから中華風の雰囲気に合うフォントを読み込み -->
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@500&family=Noto+Sans+JP:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f4eb;       /* 落ち着いた生成り色（麻雀牌のベース風） */
            --main-red: #9e1b1b;       /* 深みのある高貴な赤 */
            --accent-gold: #d4af37;   /* 上品なゴールド */
            --dark-charcoal: #1a1a1a;  /* 全体を締める黒 */
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--dark-charcoal);
            line-height: 1.6;
            padding-bottom: 40px;
        }

        /* スマホ向けに最大幅を制限してアプリ感を演出 */
        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background-color: #fffdf9;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* 👑 ヘッダー（中華風装飾） */
        header {
            background: linear-gradient(135deg, var(--dark-charcoal) 0%, var(--main-red) 100%);
            color: white;
            padding: 25px 20px;
            text-align: center;
            border-bottom: 4px solid var(--accent-gold);
            position: relative;
        }

        /* 中華風の伝統的な飾り枠（雷紋風のニュアンス） */
        header::before {
            content: "";
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            pointer-events: none;
        }

        header h1 {
            font-family: 'Kiwi Maru', serif;
            font-size: 2.2rem;
            letter-spacing: 4px;
            color: var(--accent-gold);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            margin-bottom: 5px;
        }

        header p {
            font-size: 0.85rem;
            color: #ffebad;
            letter-spacing: 1px;
        }

        /* 📢 ニューステロップ（無限ループアニメーション） */
        .news-ticker-container {
            background-color: var(--dark-charcoal);
            border-bottom: 2px solid var(--accent-gold);
            overflow: hidden;
            position: relative;
            padding: 6px 0;
        }

        .news-ticker {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: ticker 25s linear infinite;
        }

        .news-ticker span {
            display: inline-block;
            color: #ffffff;
            font-size: 0.85rem;
            margin-right: 50px;
        }

        .news-ticker span strong {
            color: var(--accent-gold);
        }

        @keyframes ticker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        /* 🎴 メインコンテンツ（メニューグリッド） */
        main {
            padding: 20px;
            flex: 1;
        }

        /* 思わず確認したくなる「本日のお知らせ」ミニバナー */
        .welcome-banner {
            background: #fff5f5;
            border-left: 4px solid var(--main-red);
            border-right: 4px solid var(--main-red);
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* スマホで綺麗に収まる2列 */
            gap: 15px;
        }

        /* 🃏 カードスタイル */
        .menu-card {
            background-color: var(--card-bg);
            border: 2px solid #e0dacf;
            border-radius: 12px;
            padding: 20px 15px;
            text-align: center;
            text-decoration: none;
            color: var(--dark-charcoal);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.04);
        }

        /* ホバー（タップ）時のエフェクト */
        .menu-card:active, .menu-card:hover {
            transform: translateY(-3px);
            border-color: var(--main-red);
            box-shadow: 0 6px 12px rgba(158, 27, 27, 0.15);
        }

        /* カードごとの中華風アクセント（左上に小さな赤い三角形） */
        .menu-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 0; height: 0;
            border-top: 12px solid var(--main-red);
            border-right: 12px solid transparent;
        }

        /* アイコンの装飾 */
        .card-icon {
            font-size: 2.2rem;
            margin-bottom: 8px;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.1));
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--dark-charcoal);
            margin-bottom: 4px;
        }

        .menu-card:hover .card-title {
            color: var(--main-red);
        }

        .card-desc {
            font-size: 0.75rem;
            color: #777;
        }

        /* 🔥 特殊なバッジ（確認したくなる仕掛け） */
        .badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: #e63946;
            color: white;
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: bold;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        /* 🧧 フッター */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.75rem;
            color: #aaa;
            border-top: 1px dashed #e0dacf;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="app-container">

    <!-- 👑 ヘッダー -->
    <header>
        <h1>だっち雀</h1>
        <p>〜 麻雀で勝って、だっちコインで欲しいものGet！ 〜</p>
    </header>

    <!-- 📢 ニューステロップ -->
    <div class="news-ticker-container">
        <div class="news-ticker">
            <span>🀄 <strong>ニュース：</strong>サイト作成中。各自、担当のページ作成に励むべし！</span>

        </div>
    </div>

    <!-- 🎴 メインメニュー -->
    <main>
        <!-- 本日のひとことバナー（開くたびに変わる運用を想定） -->
       <div class="welcome-banner" id="welcome-banner">
    <!-- ここにJavaScriptでランダムな文字が入ります -->
</div>

        <div class="menu-grid">
            
            <!-- 1. プロフィール -->
            <a href="#" class="menu-card">
                <div class="card-icon">👲</div>
                <div class="card-title">プロフィール</div>
                <div class="card-desc">称号や個人設定</div>
            </a>

            <!-- 2. 娯楽室 -->
            <a href="#" class="menu-card">
                <span class="badge">更新</span>
                <div class="card-icon">🀄</div>
                <div class="card-title">娯楽室</div>
                <div class="card-desc">何を切る？クイズなど</div>
            </a>

            <!-- 3. ランキング -->
            <a href="#" class="menu-card">
                <div class="card-icon">🏆</div>
                <div class="card-title">ランキング</div>
                <div class="card-desc">家族内の順位・役満履歴</div>
            </a>

            <!-- 4. 成績推移 -->
            <a href="#" class="menu-card">
                <div class="card-icon">📈</div>
                <div class="card-title">成績推移</div>
                <div class="card-desc">戦績グラフとデータ分析</div>
            </a>

            <!-- 5. 銀行（だっちコイン管理） -->
            <a href="#" class="menu-card">
                <span class="badge">¥</span>
                <div class="card-icon">🏦</div>
                <div class="card-title">だっち銀行</div>
                <div class="card-desc">コインの残高・送金</div>
            </a>

            <!-- 6. ストア -->
            <a href="#" class="menu-card">
                <div class="card-icon">🛒</div>
                <div class="card-title">景品ストア</div>
                <div class="card-desc">コインを景品と交換</div>
            </a>

            <!-- 7. 役一覧 -->
            <a href="#" class="menu-card">
                <div class="card-icon">📜</div>
                <div class="card-title">麻雀役一覧</div>
                <div class="card-desc">初心者も安心のルール</div>
            </a>

            <!-- 8. 点数一覧 -->
            <a href="#" class="menu-card">
                <div class="card-icon">🔢</div>
                <div class="card-title">点数計算表</div>
                <div class="card-desc">符計算・翻数ごとの一覧</div>
            </a>

        </div>
    </main>

    <!-- 🧧 フッター -->
    <footer>
        &copy; 2026 だっち雀 運営委員会 All Rights Reserved.
    </footer>

</div>
<script>
    // 📜 家族に贈る「麻雀の格言」リスト（日替わりで表示されます）
    const messages = [
        "<strong>【本日の格言】</strong>🐉勝ったのは運。負けた時は実力<br>ミスター麻雀と呼ばれた日本の麻雀プロ第1号小島武夫の格言",
        "<strong>【本日の格言】</strong>🐉飛び対子は間を落とせ<br>２２・４４・６６のように、間が一つずつ空いた対子が３組あった場合、真ん中の対子から１枚落とすべし",
        "<strong>【本日の格言】</strong>🐉副々求和、敗可立見<br>「毎局アガろう（和了しよう）とする者は、必ずすぐに負けに至る」という意味の中国の麻雀格言",
        "<strong>【本日の格言】</strong>🐉牌勢沓遠、慎打軽投<br>「配牌が悪いときは途中で色気を出さず慎重に打て」という意味の中国の麻雀格言",
        "<strong>【本日の格言】</strong>🐉どうせ死ぬなら…強く打って、死ねっ！<br>伝説の麻雀漫画「アカギ」の主人公、赤木しげる最初のセリフ。何とこの時の赤木はまだ中学生",
        "<strong>【本日の格言】</strong>🐉あンた、背中が煤けてるぜ<br>伝説の麻雀漫画「哭きの竜」の主人公、竜のキメ台詞。意味は正直わからない",
        "<strong>【本日の格言】</strong>🐉弱い人は、修正力がない。<br>裏プロ（ヤクザの代打ち）として無敗と言われた「雀鬼」、桜井章一の格言。",
        "<strong>【本日の格言】</strong>🐉勝ち続けるわけにはいかないんですから、いかに上手に負けを拾うか。<br>『麻雀放浪記』を書いた阿佐田哲也（直木賞作家である色川武大の別名義）の格言。",
        "<strong>【本日の格言】</strong>🐉親の連荘南家の責任<br>親の和了を阻止・妨害すべき立場である下家（南家）が、鳴きや適切な進行を怠って親にプレッシャーをかけず、連荘を許してしまうことを指す麻雀の古い格言",
 "<strong>【本日の格言】</strong>🐉下りポンは見逃せ<br>下りポンとは上家からポンすること。ポンは自分の手牌の進行、他家の自摸を飛ばすというメリットがあるのだが、上家から鳴く場合は他家を飛ばせない。特に序盤、上家からポンするより自摸で手牌を進行させる方がよい",
 "<strong>【本日の格言】</strong>🐉手を見ずに場を見よ<br>初心者は自分の手を考えるのに一杯一杯だけど、上手くなりたいなら自分の手より、他の３人を含めた全体を見ましょう、という意味。",
 "<strong>【本日の格言】</strong>🐉金持ち喧嘩せず<br>トップ目は、リスクを冒した賭けに出ないで、降りて場をやりすごす方がいいという格言。",
 "<strong>【本日の格言】</strong>🐉慌てる乞食はもらいが少ない<br>序盤からチー・ポンして急ぐことで、手を安くしてしまうこと。さらに鳴いていると防御も弱くなり、放銃しやすくなる。",
 "<strong>【本日の格言】</strong>🐉運七技三<br>麻雀の勝ち負けは、運７割技３割で決まるということ。",
 "<strong>【本日の格言】</strong>🐉ドラを切る馬鹿切らぬ馬鹿<br>ドラは持ってるだけで1飜の役と同じ価値。しかし、使えないドラをずっと持っていて聴牌や和了を逃すことももったいないことである。ドラの扱いに関しては難しいという格言。",
 "<strong>【本日の格言】</strong>🐉好牌先打<br>中国の格言。好い牌は先に打て、と言う意味。不要な浮き牌や不要な搭子は、中寄りから捨てて、危険牌を後に残さない方が、守りの面で有利ということ。",
 "<strong>【本日の格言】</strong>🐉平和に始まり、平和に終わる<br>麻雀の基本は平和形である、という格言",
 "<strong>【本日の格言】</strong>🐉ドラ切り立直に側聴無し<br>ドラを２枚持っているならば待ちが悪くともドラを２枚とも使った待ちにするのがセオリーであるため、ドラを切って立直するような場合には、ドラそばの待ちはないということ。",
 "<strong>【本日の格言】</strong>🐉二鳴き聴牌<br>二副露したら、聴牌していると思えという教え。 二副露めをした時に切られた牌が二副露めの傍の牌ならその近辺の待ちは薄く、二副露めの傍でない牌なら、その切られた牌の傍の待ちが危ない。",
 "<strong>【本日の格言】</strong>🐉暗刻筋は危険<br>自分が3枚4枚と持っている牌は、他の人が持っておらず欲しい可能性が高い為、その筋で待たれている確率が上がるという格言。",
 "<strong>【本日の格言】</strong>🐉序盤の裏筋、中盤以降の跨ぎ筋　<br>序盤に出ている牌の裏筋が危険で、中盤～終盤に出ている牌の跨ぎ筋が危険という意味。",
 "<strong>【本日の格言】</strong>🐉伸ばすは外、かけるは内切り<br>６８９から手を伸ばす時は９切り、立直をかける時は６切りをせよということ。手を伸ばす時には５の自摸によって５６の両搭への変化を目指す。立直をかける場合には６切り７待ちの方が出和がりやすくなる。",
 "<strong>【本日の格言】</strong>🐉二嵌（りゃんかん）の渡りを残せ<br>手作りにおいて間三軒（差が４つ）の２と６を持っている場合に、２を残せということ。これは４を自摸った時に２４６の二嵌形になるためである。特に４がドラの場合などによく使われる。",
 "<strong>【本日の格言】</strong>🐉単騎は西で待て<br>単騎待ちをするならば数牌よりも字牌、字牌の中でも三元牌や場風牌・門風牌ではない客風がよい。",
 "<strong>【本日の格言】</strong>🐉降りれば負ける。降りなければ、もっと負ける。<br>専守防衛では勝ちはないが、攻撃は最大の防御とばかり攻めていても麻雀には勝てない。降りて守ることができない人はトータルでは負けることになる。"

    ];

    // 📅 日付に基づいて、毎日固定のメッセージを選ぶ関数
    function displayDailyMessage() {
        const bannerElement = document.getElementById('welcome-banner');
        if (!bannerElement) return; // バナー要素がない場合はスキップ
        
        const now = new Date();
        // 年月日から一意の数字を作成 (例: 20260518)
        const dateNum = now.getFullYear() * 10000 + (now.getMonth() + 1) * 100 + now.getDate();
        // 配列の総数で割った余りからインデックスを決定
        const dailyIndex = dateNum % messages.length;
        
        bannerElement.innerHTML = messages[dailyIndex];
    }

    // 🌟 ページが読み込まれたら実行
    document.addEventListener('DOMContentLoaded', displayDailyMessage);
</script>
</body>
</html>
