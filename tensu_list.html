<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>だっち雀 点数計算表</title>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@500&family=Noto+Sans+JP:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f4eb;
            --main-red: #9e1b1b;
            --accent-gold: #d4af37;
            --dark-charcoal: #1a1a1a;
            --card-bg: #ffffff;
            --alba-green: #2e7d32; /* アルバのクリーンなイメージカラー */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--dark-charcoal);
            line-height: 1.5;
            padding-bottom: 40px;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background-color: #fffdf9;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* 👑 ヘッダー */
        header {
            background: linear-gradient(135deg, var(--dark-charcoal) 0%, var(--main-red) 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid var(--accent-gold);
            position: relative;
        }
        header h1 {
            font-family: 'Kiwi Maru', serif;
            font-size: 1.6rem;
            color: var(--accent-gold);
        }
        .back-btn {
            position: absolute;
            left: 15px; top: 22px;
            color: var(--accent-gold);
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid var(--accent-gold);
            padding: 3px 8px;
            border-radius: 4px;
        }

        main { padding: 15px; }

        .intro-box {
            background: #ffffff;
            border: 1px solid #e0dacf;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #555;
            text-align: center;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        h2 {
            font-size: 1.1rem;
            border-left: 4px solid var(--main-red);
            padding-left: 8px;
            margin: 24px 0 12px 0;
            color: var(--dark-charcoal);
        }

        /* 🔗 特大リンクカード */
        .link-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .ref-card {
            display: flex;
            align-items: center;
            background: #ffffff;
            border: 2px solid #e0dacf;
            border-radius: 12px;
            padding: 18px;
            text-decoration: none;
            color: var(--dark-charcoal);
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.04);
        }

        .ref-card:active {
            transform: scale(0.97);
        }

        /* 🟩 ALBANote（アルバ） */
        .card-alba { 
            border-color: var(--alba-green); 
            background: linear-gradient(135deg, #ffffff 75%, #f0f7f0 100%); 
        }
        .card-alba .card-icon { background: #e6f4ea; color: var(--alba-green); }
        .card-alba .card-title { color: var(--alba-green); font-size: 1.2rem; }

        .card-icon {
            font-size: 1.8rem;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .card-info {
            flex-grow: 1;
        }

        .card-title {
            font-weight: 700;
            margin-bottom: 2px;
        }

        .card-desc {
            font-size: 0.78rem;
            color: #666;
            line-height: 1.4;
        }

        .card-arrow {
            font-size: 1.1rem;
            color: #bbb;
            font-weight: bold;
            margin-left: 10px;
        }

        /* 🖼️ 画像表示エリア */
        .image-container {
            margin-top: 15px;
            text-align: center;
            background: #ffffff;
            border: 1px solid #e0dacf;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .illust-img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <a href="index.html" class="back-btn">◀ 戻る</a>
        <h1>だっち雀 点数計算表</h1>
    </header>

    <main>
        <div class="intro-box">
            🧮 <strong>点数計算・符計算リファレンス</strong><br>
            複雑な点数申告や、符計算の迷いを瞬時に解決できます。
        </div>

        <h2>詳細リファレンス（外部リンク）</h2>

        <div class="link-grid">
            
            <!-- 🌐 ALBANote リンク -->
            <a href="https://www.alban.co.jp/ALBANote?srsltid=AfmBOoqvQB8gwLLmKxEpaJyoNQGHTfi_8U90H4ltV5iDC4bx9BcMLLoJ" target="_blank" rel="noopener noreferrer" class="ref-card card-alba">
                <div class="card-icon">🧮</div>
                <div class="card-info">
                    <div class="card-title">ALBANote 点数計算表</div>
                    <div class="card-desc">全自動麻雀卓メーカー「アルバ」公式の非常に見やすい点数表。親・子の翻数と符数からパッと点数を確認できます。</div>
                </div>
                <div class="card-arrow">▶</div>
            </a>

        </div>
    </main>
</div>

</body>
</html>
